version: "3.9"

services:

  # ── Base de datos MySQL ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: compassenglish-mysql
    command: --lower_case_table_names=1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: CompassEnglishBD
    ports:
      - "3307:3306"   # 3307 en el host para no chocar con XAMPP si está corriendo
    volumes:
      - mysql_data:/var/lib/mysql
      - ./CompassEnglishBD.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend Spring Boot ───────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compassenglish-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/CompassEnglishBD?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      MERRIAM_API_KEY: 7350ac6a-4af7-4eeb-8221-af2e3e09ba7b
      MERRIAM_SPANISH_API_KEY: cf9f6e9f-e42f-491d-ab2a-6eecb77527c5

volumes:
  mysql_data:
