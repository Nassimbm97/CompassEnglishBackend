# Perfil activo cuando se lanza con --spring.profiles.active=local-docker
# Docker Compose inyecta estas variables de entorno automáticamente,
# pero se definen aquí como fallback para desarrollo local sin Docker.

# Base de datos — apunta al servicio "mysql" definido en docker-compose.yml
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/CompassEnglishBD?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Puerto
server.port=8080
server.address=0.0.0.0

# Merriam API
merriam.api.key=${MERRIAM_API_KEY:7350ac6a-4af7-4eeb-8221-af2e3e09ba7b}
merriam.spanish.api.key=${MERRIAM_SPANISH_API_KEY:cf9f6e9f-e42f-491d-ab2a-6eecb77527c5}
