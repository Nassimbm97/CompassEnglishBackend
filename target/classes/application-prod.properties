# ================================================================
# Perfil: prod — BD Filess.io vía Render (variables de entorno)
# Configurar en Render → Environment:
#   SPRING_PROFILES_ACTIVE = prod
#   DATABASE_URL  = jdbc:mysql://<HOST_FILESS>:<PORT>/CompassEnglishBD_warmthouso?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
#   DATABASE_USER = <usuario_filess>
#   DATABASE_PASS = <password_filess>
# Autor: Nassim Bouderbane Marrero
# ================================================================

# Base de datos — valores inyectados por Render en tiempo de ejecución
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
