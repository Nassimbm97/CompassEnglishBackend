# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/CompassEnglishBD?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.profiles.active=local

# Hibernate
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Puerto
server.port=8080
server.address=0.0.0.0

# Merriam API
merriam.api.key=7350ac6a-4af7-4eeb-8221-af2e3e09ba7b
merriam.spanish.api.key=cf9f6e9f-e42f-491d-ab2a-6eecb77527c5

# Anthropic API Key (vía futura — actualmente sin uso activo)
anthropic.api.key=${ANTHROPIC_KEY:}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=claude-haiku-4-5-20251001
